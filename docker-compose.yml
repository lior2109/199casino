version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: betpro
      POSTGRES_PASSWORD: betpro123
      POSTGRES_DB: betpro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    env_file: .env
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run dev

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: .env
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
